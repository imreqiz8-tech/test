<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Авто-поднятие резюме</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 14px 16px;
        background: #fff;
        color: #111;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 8px 0;
        font-size: 13px;
      }
      .muted {
        color: #666;
        font-size: 12px;
      }
      button {
        width: 100%;
        padding: 8px 10px;
        margin-top: 6px;
        font-size: 13px;
        cursor: pointer;
        border: 1px solid #d0d0d0;
        border-radius: 6px;
        background: #f7f7f7;
      }
      button.primary {
        background: #0a66ff;
        color: #fff;
        border-color: #0a66ff;
      }
      .switch {
        position: relative;
        width: 38px;
        height: 22px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 22px;
        transition: 0.2s;
        cursor: pointer;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 16px;
        width: 16px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider {
        background: #0a66ff;
      }
      input:checked + .slider::before {
        transform: translateX(16px);
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1d1d1d; color: #eee; }
        button { background: #2a2a2a; border-color: #3a3a3a; color: #eee; }
        .muted { color: #aaa; }
      }
    </style>
  </head>
  <body>
    <h1>Авто-поднятие резюме hh.ru</h1>

    <div class="row">
      <span>Автоматически каждые 4 часа</span>
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row muted" id="status">Загрузка…</div>
    <div class="row muted" id="next"></div>
    <div class="row muted" id="last"></div>

    <button class="primary" id="bumpNow">Поднять сейчас</button>
    <button id="openResumes">Открыть мои резюме</button>

    <script src="popup.js"></script>
  </body>
</html>
