<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Настройки — Авто-поднятие резюме</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        max-width: 560px;
        margin: 30px auto;
        padding: 0 24px 40px;
        background: #fff;
        color: #111;
        line-height: 1.45;
      }
      h1 { font-size: 20px; margin: 0 0 6px; }
      .subtitle { color: #666; margin: 0 0 20px; font-size: 13px; }
      fieldset {
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        margin: 0 0 16px;
        padding: 14px 18px 16px;
      }
      legend { font-size: 13px; font-weight: 600; padding: 0 6px; }
      label.field {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; margin: 10px 0; font-size: 14px;
      }
      label.field .hint { display: block; color: #777; font-size: 12px; font-weight: 400; margin-top: 2px; }
      label.field .text { display: flex; flex-direction: column; }
      input[type="number"], input[type="text"] {
        width: 110px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px;
        background: #fff; color: inherit; font-size: 14px;
      }
      input[type="text"] { width: 280px; }
      .row { display: flex; gap: 8px; align-items: center; }
      .switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; inset: 0;
        background: #ccc; border-radius: 22px; transition: 0.2s; cursor: pointer;
      }
      .slider::before {
        content: ""; position: absolute;
        height: 16px; width: 16px; left: 3px; top: 3px;
        background: #fff; border-radius: 50%; transition: 0.2s;
      }
      input:checked + .slider { background: #0a66ff; }
      input:checked + .slider::before { transform: translateX(16px); }
      .actions { display: flex; gap: 10px; margin-top: 18px; }
      button {
        padding: 9px 16px; font-size: 14px; cursor: pointer;
        border: 1px solid #d0d0d0; border-radius: 8px; background: #f7f7f7; color: inherit;
      }
      button.primary { background: #0a66ff; color: #fff; border-color: #0a66ff; }
      .saved {
        font-size: 13px; color: #1d7a30; opacity: 0;
        transition: opacity 0.3s; align-self: center;
      }
      .saved.show { opacity: 1; }
      @media (prefers-color-scheme: dark) {
        body { background: #1d1d1d; color: #eee; }
        fieldset { border-color: #333; }
        button { background: #2a2a2a; border-color: #3a3a3a; }
        input[type="number"], input[type="text"] {
          background: #2a2a2a; border-color: #3a3a3a; color: #eee;
        }
        .subtitle, label.field .hint { color: #aaa; }
      }
    </style>
  </head>
  <body>
    <h1>Настройки авто-поднятия резюме</h1>
    <p class="subtitle">
      Расширение само подстраивает расписание под реальный кулдаун hh.ru и
      понимает, если резюме уже поднимали вручную — тогда оно дождётся,
      когда поднятие снова станет доступно.
    </p>

    <fieldset>
      <legend>Расписание</legend>

      <label class="field">
        <span class="text">
          Интервал по умолчанию
          <span class="hint">Минут между попытками, если на странице не виден таймер. hh.ru разрешает раз в 4 ч = 240 мин.</span>
        </span>
        <input id="intervalMinutes" type="number" min="60" max="1440" step="5" />
      </label>

      <label class="field">
        <span class="text">
          Случайная задержка (jitter)
          <span class="hint">Добавляется к каждому запуску, чтобы поднятия не были подозрительно ровными.</span>
        </span>
        <input id="jitterMinutes" type="number" min="0" max="60" step="1" />
      </label>

      <label class="field">
        <span class="text">
          Тихие часы
          <span class="hint">Не поднимать резюме ночью — отложит запуск до окончания тихих часов.</span>
        </span>
        <label class="switch">
          <input id="quietHoursEnabled" type="checkbox" />
          <span class="slider"></span>
        </label>
      </label>

      <label class="field">
        <span class="text">С <span class="hint">час начала тихих часов (0–23)</span></span>
        <input id="quietHoursStart" type="number" min="0" max="23" step="1" />
      </label>

      <label class="field">
        <span class="text">До <span class="hint">час окончания тихих часов (0–23)</span></span>
        <input id="quietHoursEnd" type="number" min="0" max="23" step="1" />
      </label>
    </fieldset>

    <fieldset>
      <legend>Поведение</legend>

      <label class="field">
        <span class="text">
          Закрывать вкладку резюме после поднятия
          <span class="hint">Чтобы фоновые вкладки не копились.</span>
        </span>
        <label class="switch">
          <input id="closeTabAfter" type="checkbox" />
          <span class="slider"></span>
        </label>
      </label>

      <label class="field">
        <span class="text">
          Показывать уведомления
          <span class="hint">О каждом успехе / кулдауне / ошибке.</span>
        </span>
        <label class="switch">
          <input id="notificationsEnabled" type="checkbox" />
          <span class="slider"></span>
        </label>
      </label>

      <label class="field">
        <span class="text">
          URL конкретного резюме (опционально)
          <span class="hint">Если у вас несколько резюме — вставьте сюда ссылку на нужное. Иначе откроется список резюме.</span>
        </span>
        <input id="resumeUrl" type="text" placeholder="https://hh.ru/resume/..." />
      </label>
    </fieldset>

    <div class="actions">
      <button class="primary" id="save">Сохранить</button>
      <button id="reset">Сбросить</button>
      <span class="saved" id="saved">Сохранено ✓</span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
